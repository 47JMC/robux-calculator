<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta property="og:title" content="Robux Calculator" />
    <meta
      name="description"
      content="A simple page to calculate the amount of Robux you will receive after tax."
    />
    <meta
      property="og:description"
      content="A simple page to calculate the amount of Robux you will receive after tax."
    />
    <meta
      property="og:url"
      content="https://47jmc.github.io/robux-calculator/"
    />
    <meta property="og:type" content="website" />
    <title>Robux Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=dark_mode,light_mode"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <button id="theme-btn" onclick="toggleTheme()">
      <span class="material-symbols-outlined" id="theme-toggle-span"
        >dark_mode</span
      >
    </button>
    <h1>Robux Calculator</h1>
    <form id="ro-form">
      <label for="robuxInput"
        >Enter the number of Robux you want to donate:</label
      ><br />
      <input type="text" id="robuxInput" maxlength="21" />
      <button type="button" onclick="resetAll()">Reset</button>
      <p id="hidden-text" class="error-hidden">Error Occured</p>
    </form>
    <div class="result-box">
      <div class="sep-box">
        <p>Robux Donated</p>
        <p id="robux-dono"></p>
      </div>
      <div class="sep-box">
        <p>Robux Taxed</p>
        <p id="robux-tax"></p>
      </div>
      <div class="sep-box">
        <p>Robux Recieved</p>
        <p id="robux-got"></p>
      </div>
    </div>
    <div id="change-tax-box">
      <label for="tax-rate-input">Tax Rate:</label>
      <input type="number" id="tax-rate-input" />
    </div>

    <div class="decimal-toggle-box">
      <label for="decimalToggle">Show decimal values: </label>
      <input
        type="checkbox"
        name="decimal"
        id="decimalToggle"
        onchange="toggleDecimals()"
      />
    </div>
  </body>
  <script src="script.js"></script>
</html>
